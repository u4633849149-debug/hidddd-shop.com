<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROBITWICE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* TOPBAR */

.topbar{
height:70px;
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
font-weight:bold;
letter-spacing:2px;
}

/* SUCHLEISTE */

.search{
padding:8px;
border-radius:6px;
border:none;
width:200px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:70px;
left:0;
width:200px;
height:100%;
background:#1a1a1a;
padding:20px;
}

.dropdown-btn{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

.dropdown-container{
display:none;
margin-top:10px;
}

.dropdown-container a{
display:block;
color:#bbb;
margin:8px 0;
cursor:pointer;
}

.dropdown-container a:hover{
color:white;
}

/* CONTENT */

.content{
margin-left:220px;
padding:40px;
}

/* PRODUKT GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* PRODUKT KARTE */

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
text-align:center;
transform:translateY(30px);
opacity:0;
transition:0.5s;
}

.card.show{
transform:translateY(0);
opacity:1;
}

.card img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
background:#ff3c3c;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* WARENKORB PANEL */

.cartPanel{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
}

.cartPanel.open{
right:0;
}

</style>

</head>

<body>

<div class="topbar">

<div>ROBITWICE</div>

<input class="search" placeholder="Suche..." onkeyup="searchProducts()">

<div onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>

</div>

<div class="sidebar">

<button class="dropdown-btn">Produkte</button>

<div class="dropdown-container">
<a onclick="showShirts()">Shirts</a>
<a onclick="showPullover()">Pullover</a>
</div>

</div>

<div class="content">

<div id="productArea" class="products">
<h2>Wähle links eine Kategorie</h2>
</div>

</div>

<div class="cartPanel" id="cartPanel">

<h2>Warenkorb</h2>

<ul id="cartItems"></ul>

<h3>Total: <span id="total">0</span>€</h3>

</div>

<script>

/* DROPDOWN */

let btn=document.querySelector(".dropdown-btn")
let dropdown=document.querySelector(".dropdown-container")

btn.onclick=function(){

dropdown.style.display=
dropdown.style.display==="block" ? "none" : "block"

}

/* WARENKORB */

let cart=[]
let total=0

function addCart(name,price){

cart.push(name)

total+=price

document.getElementById("cartCount").innerText=cart.length

let li=document.createElement("li")
li.innerText=name+" - "+price+"€"

document.getElementById("cartItems").appendChild(li)

document.getElementById("total").innerText=total

}

/* CART PANEL */

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

/* PRODUKTE */

function showShirts(){

document.getElementById("productArea").innerHTML=`

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<h3>Basic Shirt</h3>
<p>25€</p>
<button onclick="addCart('Basic Shirt',25)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Street Shirt</h3>
<p>30€</p>
<button onclick="addCart('Street Shirt',30)">Add</button>
</div>

`

animateProducts()

}

function showPullover(){

document.getElementById("productArea").innerHTML=`

<div class="card">
<img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
<h3>Black Hoodie</h3>
<p>50€</p>
<button onclick="addCart('Black Hoodie',50)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<h3>Street Hoodie</h3>
<p>60€</p>
<button onclick="addCart('Street Hoodie',60)">Add</button>
</div>

`

animateProducts()

}

/* ANIMATION */

function animateProducts(){

setTimeout(()=>{

document.querySelectorAll(".card").forEach(c=>{

c.classList.add("show")

})

},100)

}

/* SUCHE */

function searchProducts(){

let input=document.querySelector(".search").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>
</html>
