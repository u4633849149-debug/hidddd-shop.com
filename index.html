<!DOCTYPE html>
<html>
<head>
<title>Robitwice Shop</title>

<style>

body{
  margin:0;
  font-family:Arial;
}

/* linke Leiste */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:200px;
  height:100%;
  background:#222;
  color:white;
  padding:20px;
}

/* Dropdown Button */
.dropdown-btn{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
  width:100%;
  text-align:left;
}

/* versteckte Produkte */
.dropdown-container{
  display:none;
  padding-left:15px;
}

.dropdown-container a{
  display:block;
  color:white;
  text-decoration:none;
  margin:5px 0;
}

/* obere Leiste */
.topbar{
  margin-left:200px;
  height:60px;
  background:#444;
  color:white;
  display:flex;
  align-items:center;
  padding-left:20px;
}

/* Inhalt */
.content{
  margin-left:200px;
  padding:20px;
}

</style>
</head>

<body>

<div class="sidebar">

<button class="dropdown-btn">Produkte</button>

<div class="dropdown-container">
<a href="#">Shirts</a>
<a href="#">Pullover</a>
</div>

</div>

<div class="topbar">
<h2>Robitwice</h2>
</div>

<div class="content">
<h1>Willkommen im Shop</h1>
</div>

<script>

var btn = document.querySelector(".dropdown-btn");
var dropdown = document.querySelector(".dropdown-container");

btn.addEventListener("click", function() {

if(dropdown.style.display === "block"){
dropdown.style.display = "none";
}else{
dropdown.style.display = "block";
}

});

</script>

</body>
</html>
