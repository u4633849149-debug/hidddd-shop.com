<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Robitwice Shop</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Benutzername">
        <input type="password" id="password" placeholder="Passwort">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- Navbar -->
<div class="topbar" id="navbar">
    <div class="logo">ROBITWICE</div>
    <div class="nav-right">
        <input class="search" placeholder="Suche Produkte...">
        <div class="wishlist">❤️ <span id="wishlistCount">0</span></div>
        <div class="cart">🛒 <span id="cartCount">0</span></div>
        <button class="login-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <button class="dropdown-btn">Produkte</button>
    <div class="dropdown-container">
        <a href="#" onclick="filterCategory('Shirt')">Shirts</a>
        <a href="#" onclick="filterCategory('Pullover')">Pullover</a>
        <a href="#" onclick="filterCategory('Hoodie')">Hoodies</a>
    </div>
</div>

<!-- Content -->
<div class="content" id="content">
    <div class="products" id="products"></div>
</div>

<!-- PayPal Checkout -->
<div class="checkout-container" id="checkoutContainer">
    <button id="checkoutBtn">💳 Mit PayPal bezahlen</button>
</div>

</body>
</html>
<!-- Login & Register Overlay -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2 id="loginTitle">Login</h2>

        <!-- Login Form -->
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Benutzername">
            <input type="password" id="loginPassword" placeholder="Passwort">
            <button onclick="login()">Login</button>
            <button class="google-btn" onclick="googleLogin()">Mit Google anmelden</button>
            <p>Noch keinen Account? <span class="toggle-form" onclick="toggleForm()">Registrieren</span></p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none;">
            <input type="text" id="registerUsername" placeholder="Benutzername">
            <input type="password" id="registerPassword" placeholder="Passwort">
            <button onclick="register()">Account erstellen</button>
            <p>Schon einen Account? <span class="toggle-form" onclick="toggleForm()">Login</span></p>
        </div>
    </div>
</div>
