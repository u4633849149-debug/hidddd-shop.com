<!DOCTYPE html>
<html>
<head>
<title>Robitwice</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
animation:fadeIn 1s ease;
}

/* Animation beim Laden */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Sidebar */
.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#111;
color:white;
padding:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

/* Dropdown Button */
.dropdown-btn{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

/* Dropdown Inhalt */
.dropdown-container{
display:none;
margin-top:10px;
}

.dropdown-container a{
display:block;
color:#ccc;
text-decoration:none;
margin:8px 0;
transition:0.2s;
}

.dropdown-container a:hover{
color:white;
transform:translateX(5px);
}

/* Topbar */
.topbar{
margin-left:220px;
height:70px;
background:#1f1f1f;
color:white;
display:flex;
align-items:center;
padding-left:30px;
font-size:22px;
letter-spacing:1px;
}

/* Content */
.content{
margin-left:220px;
height:calc(100vh - 70px);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* Titel */
.title{
font-size:48px;
font-weight:bold;
animation:slideUp 1s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Robitwice</h2>

<button class="dropdown-btn">Produkte</button>

<div class="dropdown-container">
<a href="#">Shirts</a>
<a href="#">Pullover</a>
</div>

</div>

<div class="topbar">
Robitwice
</div>

<div class="content">
<div class="title">Willkommen im Shop</div>
</div>

<script>

var btn = document.querySelector(".dropdown-btn");
var dropdown = document.querySelector(".dropdown-container");

btn.addEventListener("click", function(){

if(dropdown.style.display === "block"){
dropdown.style.display = "none";
}else{
dropdown.style.display = "block";
}

});

</script>

</body>
</html>
