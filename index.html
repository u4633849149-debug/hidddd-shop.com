<!DOCTYPE html>
<html>
<head>
<title>Mein Shop</title>

<style>

body{
  margin:0;
  font-family:Arial;
}

/* linke Leiste */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:200px;
  height:100%;
  background:#222;
  color:white;
  padding:20px;
}

/* obere Leiste */
.topbar{
  margin-left:200px;
  height:60px;
  background:#444;
  color:white;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding-right:20px;
}

/* Inhalt */
.content{
  margin-left:200px;
  padding:20px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>Produkte</h2>
</div>

<div class="topbar">
  <p>Mein Shop</p>
</div>

<div class="content">
  <h1>Willkommen in meinem Shop 👕</h1>
</div>

</body>
</html>
