<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robitwice Shop</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111;
color:white;
padding:20px;
}

.dropdown-btn{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

.dropdown-container{
display:none;
margin-top:10px;
}

.dropdown-container a{
display:block;
color:#ccc;
text-decoration:none;
margin:6px 0;
}

.dropdown-container a:hover{
color:white;
}

/* Topbar */

.topbar{
margin-left:200px;
height:70px;
background:#1f1f1f;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

/* Suche */

.search{
padding:8px;
border-radius:6px;
border:none;
width:200px;
}

/* Warenkorb */

.cart{
background:white;
color:black;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
}

/* Inhalt */

.content{
margin-left:200px;
padding:40px;
}

/* Produkt Grid */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* Produktkarte */

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transform:translateY(40px);
opacity:0;
transition:0.6s;
}

.product.show{
transform:translateY(0);
opacity:1;
}

.product img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

/* Mobile */

@media(max-width:700px){

.sidebar{
width:150px;
}

.topbar{
margin-left:150px;
}

.content{
margin-left:150px;
}

}

</style>
</head>

<body>

<div class="sidebar">

<h2>Robitwice</h2>

<button class="dropdown-btn">Produkte</button>

<div class="dropdown-container">
<a href="#">Shirts</a>
<a href="#">Pullover</a>
</div>

</div>

<div class="topbar">

<input class="search" placeholder="Suche Produkte...">

<div class="cart">
🛒 <span id="cartCount">0</span>
</div>

</div>

<div class="content">

<h1>Willkommen im Shop</h1>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Shirt</h3>
<p>20€</p>
<button onclick="addCart()">In Warenkorb</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Pullover</h3>
<p>40€</p>
<button onclick="addCart()">In Warenkorb</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Hoodie</h3>
<p>50€</p>
<button onclick="addCart()">In Warenkorb</button>
</div>

</div>

</div>

<script>

/* Dropdown Produkte */

var btn = document.querySelector(".dropdown-btn");
var dropdown = document.querySelector(".dropdown-container");

btn.onclick = function(){

if(dropdown.style.display==="block"){
dropdown.style.display="none";
}else{
dropdown.style.display="block";
}

}

/* Warenkorb */

let cart=0;

function addCart(){
cart++
document.getElementById("cartCount").innerText=cart
}

/* Scroll Animation */

let products=document.querySelectorAll(".product")

window.addEventListener("scroll",function(){

products.forEach(p=>{
let top=p.getBoundingClientRect().top

if(top<window.innerHeight-50){
p.classList.add("show")
}

})

})

</script>

</body>
</html>
